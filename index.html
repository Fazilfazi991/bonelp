<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bone | Cusina</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f5f0eb;
    --red: #c0001a;
    --cream: #ede8e1;
    --bone: #d4c9b0;
    --charcoal: #1a1a1a;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background-color: var(--black);
    color: var(--white);
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
    z-index: 100;
  }

  /* Blood drip lines */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--red);
    box-shadow: 0 0 30px var(--red);
    z-index: 50;
    animation: pulse-line 3s ease-in-out infinite;
  }

  @keyframes pulse-line {
    0%, 100% { opacity: 1; box-shadow: 0 0 30px var(--red); }
    50% { opacity: 0.6; box-shadow: 0 0 60px var(--red), 0 0 100px var(--red); }
  }

  .page {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 2rem;
  }

  /* Background radial glow */
  .glow {
    position: fixed;
    width: 800px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(192,0,26,0.12) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }

  /* --- LOGO with TILT --- */
  .logo-wrapper {
    position: relative;
    z-index: 10;
    margin-bottom: 3.5rem;
    perspective: 1000px;
    cursor: pointer;
  }

  .logo-img {
    width: clamp(280px, 55vw, 560px);
    display: block;
    filter: drop-shadow(0 0 30px rgba(255,255,255,0.5)) drop-shadow(0 8px 24px rgba(0,0,0,0.8));
    animation: tilt-float 5s ease-in-out infinite;
    transform-origin: center center;
    transition: filter 0.3s ease;
    will-change: transform;
  }

  .logo-img:hover {
    filter: drop-shadow(0 0 50px rgba(255,255,255,0.7)) drop-shadow(0 8px 32px rgba(0,0,0,0.9));
    animation: tilt-float-hover 5s ease-in-out infinite;
  }

  @keyframes tilt-float {
    0%   { transform: rotate(-4deg) translateY(0px) scale(1); }
    20%  { transform: rotate(3deg) translateY(-8px) scale(1.01); }
    40%  { transform: rotate(-2deg) translateY(-14px) scale(1.015); }
    60%  { transform: rotate(4deg) translateY(-8px) scale(1.01); }
    80%  { transform: rotate(-3deg) translateY(-3px) scale(1.005); }
    100% { transform: rotate(-4deg) translateY(0px) scale(1); }
  }

  @keyframes tilt-float-hover {
    0%   { transform: rotate(-5deg) translateY(0px) scale(1.05); }
    25%  { transform: rotate(5deg) translateY(-12px) scale(1.06); }
    50%  { transform: rotate(-4deg) translateY(-18px) scale(1.07); }
    75%  { transform: rotate(5deg) translateY(-10px) scale(1.06); }
    100% { transform: rotate(-5deg) translateY(0px) scale(1.05); }
  }

  /* Subtle shimmer behind logo */
  .logo-wrapper::after {
    content: '';
    position: absolute;
    inset: -50px;
    background: radial-gradient(ellipse, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.3) 50%, transparent 70%);
    animation: shimmer-pulse 5s ease-in-out infinite;
    z-index: -1;
    border-radius: 50%;
  }

  @keyframes shimmer-pulse {
    0%, 100% { opacity: 0.5; transform: scale(0.95); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  /* --- TEXT CONTENT --- */
  .content {
    text-align: center;
    position: relative;
    z-index: 10;
    animation: fade-up 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tagline-top {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(0.75rem, 2vw, 1rem);
    letter-spacing: 0.4em;
    color: var(--red);
    text-transform: uppercase;
    margin-bottom: 1.2rem;
    opacity: 0.9;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4.5vw, 3.4rem);
    font-weight: 400;
    font-style: italic;
    line-height: 1.15;
    letter-spacing: 0.01em;
    color: var(--cream);
    margin-bottom: 1rem;
  }

  .headline em {
    font-style: normal;
    color: var(--bone);
    font-weight: 700;
  }

  .subline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 2.2vw, 1.45rem);
    font-weight: 300;
    font-style: italic;
    color: rgba(245, 240, 235, 0.55);
    letter-spacing: 0.06em;
    margin-bottom: 2.4rem;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    justify-content: center;
    margin-bottom: 2.4rem;
  }

  .divider-line {
    height: 1px;
    width: 80px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
  }

  .divider-bone {
    font-size: 1.2rem;
    opacity: 0.6;
  }

  /* Coming Soon badge */
  .coming-soon {
    display: inline-block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(0.65rem, 1.5vw, 0.85rem);
    letter-spacing: 0.35em;
    color: var(--black);
    background: var(--red);
    padding: 0.55em 2em;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    margin-bottom: 2.2rem;
    animation: badge-glow 3s ease-in-out infinite;
  }

  @keyframes badge-glow {
    0%, 100% { box-shadow: 0 0 0px var(--red); }
    50% { box-shadow: 0 0 20px rgba(192,0,26,0.5), 0 0 40px rgba(192,0,26,0.2); }
  }

  .coming-soon::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    animation: sheen 3s ease-in-out 1.5s infinite;
  }

  @keyframes sheen {
    0% { left: -100%; }
    60%, 100% { left: 200%; }
  }

  /* URL link */
  .site-url {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.85rem, 1.8vw, 1.1rem);
    font-weight: 300;
    letter-spacing: 0.18em;
    color: rgba(245,240,235,0.35);
    text-decoration: none;
    text-transform: lowercase;
    transition: color 0.3s ease, letter-spacing 0.3s ease;
    border-bottom: 1px solid rgba(192,0,26,0.3);
    padding-bottom: 2px;
  }

  .site-url:hover {
    color: var(--red);
    letter-spacing: 0.25em;
    border-bottom-color: var(--red);
  }

  /* Corner decorations */
  .corner {
    position: fixed;
    width: 60px;
    height: 60px;
    z-index: 5;
    opacity: 0.3;
  }

  .corner-tl { top: 20px; left: 20px; border-top: 1px solid var(--red); border-left: 1px solid var(--red); }
  .corner-tr { top: 20px; right: 20px; border-top: 1px solid var(--red); border-right: 1px solid var(--red); }
  .corner-bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--red); border-left: 1px solid var(--red); }
  .corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--red); border-right: 1px solid var(--red); }

  /* Cusina tagline bottom */
  .cusina-label {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.5em;
    color: rgba(245,240,235,0.2);
    z-index: 10;
    text-transform: uppercase;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="glow"></div>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="page">
  <div class="logo-wrapper">
    <img class="logo-img" src="./WhatsApp_Image_2026-04-26_at_2.32.32_PM-removebg-preview.png" alt="The Bone Logo">
  </div>

  <div class="content">
    <p class="tagline-top">The Art of Bone &amp; Marrow</p>

    <h1 class="headline">
      An <em>Extraordinary</em><br>Culinary Experience Awaits
    </h1>

    <p class="subline">Coming Soon to The Cusina</p>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-bone">🦴</span>
      <div class="divider-line"></div>
    </div>

    <div class="coming-soon">Coming Soon</div><br>

    <a href="http://thebonecusina.com" class="site-url" target="_blank">thebonecusina.com</a>
  </div>
</div>

<p class="cusina-label">The Bone &nbsp;·&nbsp; Cusina &nbsp;·&nbsp; Dubai</p>


</body>
</html>
